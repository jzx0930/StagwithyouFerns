; ===================================================================
;  網站狀態設定  config.ini   ——  改這個檔就能控制網站行為與外觀
;  改完存檔 → GitHub Desktop commit + push 就生效(重新整理即可)
;  ; 或 # 開頭是註解。開關可用 on/off、true/false、yes/no、1/0
; ===================================================================

[site]
; 開場大標題(也會當瀏覽器分頁標題)
title = StagwithyouFerns
; 開場副標小字
eyebrow = HERBARIUM · 成長紀錄
; 大廳「選一個分類」下方那行小字
lobby_subtitle = 選一個分類,進入觀看。

[background]
; 背景夜景照片的 Google Drive 檔案 ID(換背景改這個就好)
image_id = 1fgb-BT8G4-nd_HuItDWEFv0w51fgmjHE
; 背景亮度(1 = 原亮度,越小越暗)
brightness = 0.82

[intro]
; 要不要播開場飛越(off = 直接進大廳)
show = on
; 飛越每個分類的毫秒數(越大越慢)
scene_duration = 460
; 落地動畫毫秒數
land_duration = 1400
; 落地後「自動進大廳」的等待秒數(手動點一樣立即進)
lobby_enter_delay = 1.5

[effects]
; 背景粒子(螢火蟲光點)
particles = on
; 背景粒子(螢火蟲)亮度:1=原亮度,越大越亮、越小越暗(建議 0~2)
particle_brightness = 1.5
; 玻璃卡片/面板(指標卡、植物卡、時間軸卡…)不透明度:1=原本,越大越實、越小越透明(建議 0~2)
panel_opacity = 1.5
; 卡片跟隨滑鼠 3D 傾斜
card_tilt = on
; 按鈕磁吸
magnetic_buttons = on
; 卡片進場交錯動畫
card_entrance = on

[shop]
; 購買功能主開關(蓋過 shop-config.js;Web3Forms key 與價格仍放 shop-config.js)
enabled = false
; 幣別前綴
currency = NT$

[handwriting]
; 進入植物後名稱手寫的速度
; 中文筆順速度:數字越大越快(建議 1~5)
cjk_speed = 3.5
; 中文每一筆之間的間隔毫秒:越小越快(建議 0~40)
cjk_stroke_delay = 10
; 英文/數字書寫的時間(秒):越小越快
latin_duration = 0.42

