; ===================================================================
;  網站狀態設定  config.ini   ——  改這個檔就能控制網站行為與外觀
;  改完存檔 → GitHub Desktop commit + push 就生效(重新整理即可)
;  ; 或 # 開頭是註解。
;
;  ✱ 開關(bool):一律用  true / false
;  ✱ 比例/亮度/透明度:一律用  0~100 的數字(100 = 原本;可超過 100 加強)
;  ✱ 其他數值(毫秒、秒、速度):一律帶小數點,例如 460.0、1.5
; ===================================================================


[site]

; 開場大標題(也會當瀏覽器分頁標題)
title = StagwithyouFerns

; 開場副標小字
eyebrow = HERBARIUM · 成長紀錄

; 大廳「選一個分類」下方那行小字
lobby_subtitle = 選一個分類,進入觀看。


[background]

; 背景夜景照片的 Google Drive 檔案 ID(換背景改這個就好)
image_id = 1fgb-BT8G4-nd_HuItDWEFv0w51fgmjHE

; 背景亮度:0~100(100 = 原亮度,越小越暗)
brightness = 100.0


[intro]

; 要不要播開場飛越(false = 直接進大廳)
show = true

; 飛越每個分類的毫秒數(越大越慢)
scene_duration = 400.0

; 落地動畫毫秒數
land_duration = 1400.0

; 落地後「自動進大廳」的等待秒數(手動點一樣立即進)
lobby_enter_delay = 1.5


[effects]

; 背景粒子(螢火蟲光點)開關
particles = true

; 背景粒子(螢火蟲)亮度:0~100(100 = 原亮度,越大越亮)
particle_brightness = 220.0

; 玻璃卡片/面板(植物卡、時間軸卡、植物介紹…)不透明度:0~100(100 = 原本,越大越實)
panel_opacity = 180.0

; 詳情頁指標卡(入手/累積照片/目前個體那三張)不透明度:0~100(100 = 原本,越大越實)
metric_opacity = 100.0

; 卡片跟隨滑鼠 3D 傾斜
card_tilt = true

; 按鈕磁吸
magnetic_buttons = true

; 卡片進場交錯動畫
card_entrance = true


[shop]

; 購買功能主開關(蓋過 shop-config.js;Web3Forms key 與價格仍放 shop-config.js)
enabled = false

; 幣別前綴(文字)
currency = NT$


[handwriting]

; 進入植物後名稱手寫的速度

; 中文筆順速度:數字越大越快(建議 1.0~5.0)
cjk_speed = 3.5

; 中文每一筆之間的間隔毫秒:越小越快(建議 0.0~40.0)
cjk_stroke_delay = 10.0

; 英文/數字書寫的時間(秒):越小越快
latin_duration = 1.0
