; ===================================================================
;  網站狀態設定  config.ini   ——  改這個檔就能控制網站行為
;  改完存檔 → GitHub Desktop commit + push 就生效(重新整理即可)
;  ; 或 # 開頭是註解。true/false 可用 on/off、yes/no、1/0
; ===================================================================

[shop]
; 要不要開放購買功能(價格、加入購物車、結帳)
; on = 開啟   off = 關閉(回到純展示)
; 註:這是購買功能的主開關,會蓋過 shop-config.js 的設定。
;     Web3Forms key 與各植物價格仍然放在 shop-config.js。
enabled = on

[intro]
; 開場飛越「落地後自動進大廳」的等待秒數(手動點一樣立即進)
lobby_enter_delay = 1.5

[handwriting]
; 進入植物後名稱手寫的速度
; 中文筆順速度:數字越大越快(建議 1~5)
cjk_speed = 3.5
; 中文每一筆之間的間隔毫秒:越小越快(建議 0~40)
cjk_stroke_delay = 10
; 英文/數字書寫的時間(秒):越小越快
latin_duration = 0.42
