<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>大廳滾動飛行 · 原型</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;1,400&family=Space+Grotesk:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4.0.0/dist/model-viewer.min.js"></script>
  <style>
    :root{ --green:#9ad8ab; --mint:#bfe6cb; --ink:#eef2ef; }
    *{ box-sizing:border-box; } html,body{ margin:0; }
    body{ background:#06090a; color:var(--ink); font-family:'Space Grotesk',system-ui,sans-serif; }
    #scroll{ height:640vh; }                 /* 5 場景 + 落地 */
    .stage{ position:fixed; inset:0; overflow:hidden; z-index:0; }
    .bg-photo{ position:absolute; inset:-8%; background:url('https://lh3.googleusercontent.com/d/1fgb-BT8G4-nd_HuItDWEFv0w51fgmjHE=w2000') center/cover no-repeat; filter:brightness(0.5) saturate(0.85) blur(3px); transform:scale(1.1); will-change:transform; }
    .bg-night{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(6,15,28,.40) 0%, rgba(4,9,18,.62) 70%, rgba(3,7,14,.74) 100%); }
    #fx{ position:absolute; inset:0; width:100%; height:100%; }
    .scene{ position:absolute; inset:0; opacity:0; will-change:opacity; }
    .scene model-viewer{ width:100%; height:100%; --poster-color:transparent; background:transparent; }
    .cap{ position:absolute; left:8%; bottom:18%; opacity:0; will-change:opacity,transform; text-shadow:0 2px 18px rgba(0,0,0,.75); pointer-events:none; }
    .cap .zh{ font-family:'Newsreader',serif; font-size:clamp(40px,7vw,72px); line-height:1; color:#f4f8f4; }
    .cap .la{ font-family:'Newsreader',serif; font-style:italic; font-size:clamp(16px,2.2vw,24px); color:var(--green); margin-top:8px; letter-spacing:.02em; }
    .hint{ position:fixed; left:50%; bottom:22px; transform:translateX(-50%); z-index:3; font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.14em; color:var(--mint); opacity:.75; animation:bob 2.2s ease-in-out infinite; }
    @keyframes bob{ 0%,100%{ transform:translate(-50%,0);} 50%{ transform:translate(-50%,6px);} }
    .bar{ position:fixed; top:0; left:0; height:3px; width:0; background:linear-gradient(90deg,var(--green),var(--mint)); z-index:4; }
    /* 落地大廳 */
    .land{ position:fixed; inset:0; z-index:3; display:flex; align-items:center; justify-content:center; text-align:center; opacity:0; pointer-events:none; }
    .land-in{ transform:translateY(24px); transition:none; }
    .land .eyebrow{ font-family:'Space Mono',monospace; font-size:13px; letter-spacing:.3em; color:var(--mint); }
    .land h1{ font-family:'Newsreader',serif; font-weight:400; font-size:clamp(44px,9vw,90px); margin:12px 0 18px; color:#f4f8f4; }
    .land .chips{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:640px; margin:0 auto 30px; }
    .land .chips span{ font-family:'Space Mono',monospace; font-size:13px; color:var(--green); border:1px solid rgba(154,216,171,.32); border-radius:999px; padding:7px 15px; background:rgba(0,0,0,.28); backdrop-filter:blur(8px); }
    .land .enter{ display:inline-block; font-family:'Space Grotesk',sans-serif; font-size:15px; color:#0a0f0d; background:var(--green); border-radius:999px; padding:13px 30px; text-decoration:none; box-shadow:0 10px 34px rgba(154,216,171,.35); }
    .land.on{ pointer-events:auto; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="bg-photo" id="bgp"></div>
    <div class="bg-night"></div>
    <canvas id="fx"></canvas>
    <div id="scenes"></div>
    <div class="land" id="land">
      <div class="land-in">
        <div class="eyebrow">HERBARIUM · 成長紀錄</div>
        <h1>StagwithyouFerns</h1>
        <div class="chips"><span>鹿角蕨</span><span>棒槌</span><span>仙人掌</span><span>龍舌蘭</span><span>塊根</span><span>大戟</span><span>觀葉</span><span>美照</span></div>
        <a class="enter" href="./index.html">進入大廳 →</a>
      </div>
    </div>
    <div class="hint" id="hint">↓ 往下滾動,飛過你的植物世界 ↓</div>
  </div>
  <div class="bar" id="bar"></div>
  <div id="scroll"></div>

  <script>
    // 每個分類:模型、名稱、屬名、以及進場的鏡頭「基準俯仰角 el / 方位角 az」(讓飛行路徑有變化)
    var SCENES = [
      { m:'models/Platycerium/Platycerium.glb', zh:'鹿角蕨', la:'Platycerium', el:84, az:  0 },
      { m:'models/Pachypodium/Pachypodium.glb', zh:'棒槌',   la:'Pachypodium', el:72, az:-16 },
      { m:'models/Cactaceae/Cactaceae.glb',     zh:'仙人掌', la:'Cactaceae',   el:90, az: 14 },
      { m:'models/Agave/Agave.glb',             zh:'龍舌蘭', la:'Agave',       el:76, az:-10 },
      { m:'models/Caudex/Caudex.glb',           zh:'塊根',   la:'Caudex',      el:82, az:  8 }
    ];
    var N = SCENES.length;
    var SCENE_END = 0.84;                     // 前 84% 捲動放場景,後面落地
    var scenesWrap = document.getElementById('scenes');
    var stage = document.querySelector('.stage');
    var land = document.getElementById('land');
    var bgp = document.getElementById('bgp');
    var hint = document.getElementById('hint');
    var mv = [], scn = [], cap = [];
    SCENES.forEach(function (s, i) {
      var d = document.createElement('div'); d.className = 'scene';
      var v = document.createElement('model-viewer');
      v.setAttribute('interaction-prompt','none');
      v.setAttribute('disable-zoom','');
      v.setAttribute('exposure','1.05');
      v.setAttribute('shadow-intensity','0.7');
      v.setAttribute('environment-image','neutral');
      v.setAttribute('camera-orbit', s.az+'deg '+s.el+'deg 14m');
      v.setAttribute('min-camera-orbit','auto 0deg 1m');
      v.setAttribute('max-camera-orbit','auto 180deg 18m');
      v.setAttribute('field-of-view','30deg');
      d.appendChild(v); scenesWrap.appendChild(d);
      var c = document.createElement('div'); c.className = 'cap';
      c.innerHTML = '<div class="zh">'+s.zh+'</div><div class="la">'+s.la+'</div>';
      stage.appendChild(c);
      mv.push(v); scn.push(d); cap.push(c);
    });

    function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
    function smooth(t){ t=clamp(t,0,1); return t*t*(3-2*t); }

    function frame(){
      var total = document.documentElement.scrollHeight - window.innerHeight;
      var p = total>0 ? clamp(window.scrollY/total,0,1) : 0;
      document.getElementById('bar').style.width = (p*100)+'%';

      var sp = clamp(p / SCENE_END, 0, 1);    // 場景進度 0..1
      var lp = smooth((p - SCENE_END) / (1 - SCENE_END)); // 落地進度 0..1
      var fp = sp * N;

      // 背景隨捲動緩慢下移(視差)
      bgp.style.transform = 'translateY(' + (p*-40) + 'px) scale(1.1)';

      for (var i=0;i<N;i++){
        var x = fp - (i+0.5);
        var near = Math.abs(x) < 1.35;
        if (near && !mv[i].getAttribute('src')) mv[i].setAttribute('src', SCENES[i].m);
        var vis = smooth(1 - Math.abs(x)/0.82) * (1 - lp); // 落地時所有場景淡出
        scn[i].style.opacity = vis;
        cap[i].style.opacity = smooth(1 - Math.abs(x)/0.5) * (1 - lp);
        cap[i].style.transform = 'translateY('+(x*46)+'px)';
        if (vis > 0.01){
          var t  = clamp((x+0.82)/1.64, 0, 1);          // 進場 0..1
          var radius = 15 - t*13;                        // 15m→2m 一路飛入
          var el = SCENES[i].el + (0.5 - t)*16;          // 俯仰 swoop:高→低穿過
          var az = SCENES[i].az + x*24;                  // 橫移視差
          mv[i].cameraOrbit = az.toFixed(1)+'deg '+el.toFixed(1)+'deg '+radius.toFixed(2)+'m';
        }
      }
      // 落地大廳
      land.style.opacity = lp;
      land.classList.toggle('on', lp > 0.6);
      land.querySelector('.land-in').style.transform = 'translateY('+((1-lp)*28)+'px)';
      hint.style.opacity = (p < 0.05 ? 0.75 : 0) ;
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    /* 螢火蟲 */
    (function(){
      var c=document.getElementById('fx'), g=c.getContext('2d'), W,H,DPR,pts;
      function rs(){ DPR=Math.min(window.devicePixelRatio||1,2); W=c.width=innerWidth*DPR; H=c.height=innerHeight*DPR; }
      rs(); addEventListener('resize', rs);
      pts=[]; for(var i=0;i<70;i++) pts.push({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.0007,vy:(Math.random()-.5)*.0007,s:.5+Math.random()*1.6,ph:Math.random()*6.28,sp:.3+Math.random()*.7});
      var t=0;
      (function loop(){
        t+=.006; g.clearRect(0,0,W,H); g.globalCompositeOperation='lighter';
        for(var k=0;k<pts.length;k++){ var p=pts[k];
          p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=1; if(p.x>1)p.x=0; if(p.y<0)p.y=1; if(p.y>1)p.y=0;
          var tw=.45+.55*Math.sin(t*6*p.sp+p.ph), a=Math.max(0,tw)*.9;
          var px=p.x*W, py=p.y*H, r=p.s*1.6*DPR;
          var rg=g.createRadialGradient(px,py,0,px,py,r*5);
          rg.addColorStop(0,'rgba(226,255,170,'+(a*.9)+')'); rg.addColorStop(.3,'rgba(172,240,112,'+(a*.5)+')'); rg.addColorStop(1,'rgba(110,200,70,0)');
          g.fillStyle=rg; g.beginPath(); g.arc(px,py,r*5,0,6.283); g.fill();
          g.fillStyle='rgba(234,255,196,'+a+')'; g.beginPath(); g.arc(px,py,r,0,6.283); g.fill();
        }
        g.globalCompositeOperation='source-over'; requestAnimationFrame(loop);
      })();
    })();
  </script>
</body>
</html>
